name: Update Live Learning Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Dashboard
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const username = 'jaindhruv04';

            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: 'pushed',
              direction: 'desc',
              per_page: 5
            });

            const activeRepos = repos
              .filter(r => !r.fork)
              .filter(r => r.name !== username)
              .slice(0, 3);

            let table = `| Repository | Latest Activity | Updated |\n`;
            table += `|------------|----------------|---------|\n`;

            for (const repo of activeRepos) {
              let commitMessage = "No recent commits";

              try {
                const { data: commits } =
                  await github.rest.repos.listCommits({
                    owner: username,
                    repo: repo.name,
                    per_page: 1
                  });

                if (commits.length > 0) {
                  commitMessage =
                    commits[0].commit.message
                      .split('\n')[0]
                      .substring(0, 60);
                }
              } catch {}

              const updated =
                new Date(repo.pushed_at)
                  .toISOString()
                  .split('T')[0];

              table += `| ${repo.name} | ${commitMessage} | ${updated} |\n`;
            }

            const readme = fs.readFileSync('README.md', 'utf8');

            const updatedReadme = readme.replace(
              /<!--START_SECTION:live_dashboard-->[\s\S]*<!--END_SECTION:live_dashboard-->/,
              `<!--START_SECTION:live_dashboard-->\n${table}\n<!--END_SECTION:live_dashboard-->`
            );

            fs.writeFileSync('README.md', updatedReadme);

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          git commit -m "Update dashboard" || exit 0

          git push
