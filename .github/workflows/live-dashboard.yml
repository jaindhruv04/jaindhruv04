name: Update Live Learning Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Dashboard
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const username = "jaindhruv04";

            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: "pushed",
              direction: "desc",
              per_page: 20
            });

            const allActiveRepos = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name !== username);

            const dashboardRepos = allActiveRepos.slice(0, 3);
            const languageRepos = allActiveRepos.slice(0, 10);

            let dashboardTable = `| Repository | Latest Activity | Updated |\n`;
            dashboardTable += `|------------|----------------|---------|\n`;

            for (const repo of dashboardRepos) {
              let commitMessage = "No recent commits";

              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner: username,
                  repo: repo.name,
                  per_page: 1
                });

                if (commits.length > 0) {
                  commitMessage = commits[0].commit.message
                    .split("\n")[0]
                    .replace(/\|/g, "-")
                    .substring(0, 60);
                }
              } catch (error) {}

              const updated = new Date(repo.pushed_at)
                .toISOString()
                .split("T")[0];

              dashboardTable += `| [${repo.name}](${repo.html_url}) | ${commitMessage} | ${updated} |\n`;
            }

            const languageTotals = {};

            for (const repo of languageRepos) {
              try {
                const { data: languages } = await github.rest.repos.listLanguages({
                  owner: username,
                  repo: repo.name
                });

                for (const [language, bytes] of Object.entries(languages)) {
                  languageTotals[language] = (languageTotals[language] || 0) + bytes;
                }
              } catch (error) {}
            }

            const sortedLanguages = Object.entries(languageTotals)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5);

            const totalBytes = sortedLanguages.reduce((sum, [, bytes]) => sum + bytes, 0);

            let languageTable = `| Language | Usage |\n`;
            languageTable += `|----------|-------|\n`;

            if (sortedLanguages.length === 0) {
              languageTable += `| No data yet | 0% |\n`;
            } else {
              for (const [language, bytes] of sortedLanguages) {
                const percent = totalBytes === 0
                  ? 0
                  : Math.round((bytes / totalBytes) * 100);

                languageTable += `| ${language} | ${percent}% |\n`;
              }
            }

            let readme = fs.readFileSync("README.md", "utf8");

            readme = readme.replace(
              /<!--START_SECTION:live_dashboard-->[\s\S]*<!--END_SECTION:live_dashboard-->/,
              `<!--START_SECTION:live_dashboard-->\n${dashboardTable}\n<!--END_SECTION:live_dashboard-->`
            );

            readme = readme.replace(
              /<!--START_SECTION:language_focus-->[\s\S]*<!--END_SECTION:language_focus-->/,
              `<!--START_SECTION:language_focus-->\n${languageTable}\n<!--END_SECTION:language_focus-->`
            );

            fs.writeFileSync("README.md", readme);

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet && exit 0

          git commit -m "Update live dashboard [skip ci]"

          git pull --rebase origin main
          git push origin main
