name: Update Live Learning Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Dashboard
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = 'jaindhruv04';

            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: 'pushed',
              direction: 'desc',
              per_page: 8
            });

            const activeRepos = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name !== username)
              .slice(0, 3);

            let table = `| Repository | Latest Activity | Updated |\n`;
            table += `|------------|----------------|---------|\n`;

            const languageTotals = {
              "C++": 0,
              "JavaScript": 0,
              "HTML": 0,
              "CSS": 0
            };

            for (const repo of activeRepos) {
              let commitMessage = "No recent commits";

              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner: username,
                  repo: repo.name,
                  per_page: 1
                });

                if (commits.length > 0) {
                  commitMessage = commits[0].commit.message
                    .split('\n')[0]
                    .substring(0, 60);
                }
              } catch {}

              try {
                const { data: languages } = await github.rest.repos.listLanguages({
                  owner: username,
                  repo: repo.name
                });

                languageTotals["C++"] += languages["C++"] || 0;
                languageTotals["JavaScript"] += languages["JavaScript"] || 0;
                languageTotals["HTML"] += languages["HTML"] || 0;
                languageTotals["CSS"] += languages["CSS"] || 0;
              } catch {}

              const updated = new Date(repo.pushed_at)
                .toISOString()
                .split('T')[0];

              table += `| [${repo.name}](${repo.html_url}) | ${commitMessage} | ${updated} |\n`;
            }

            const total =
              languageTotals["C++"] +
              languageTotals["JavaScript"] +
              languageTotals["HTML"] +
              languageTotals["CSS"];

            const percent = (value) => total === 0 ? 0 : Math.round((value / total) * 100);

            const cpp = percent(languageTotals["C++"]);
            const js = percent(languageTotals["JavaScript"]);
            const html = percent(languageTotals["HTML"]);
            const css = percent(languageTotals["CSS"]);

            const barWidth = (value) => Math.max(4, Math.round(value * 3.2));

            const svg = `<svg width="520" height="210" xmlns="http://www.w3.org/2000/svg">
              <rect width="520" height="210" rx="14" fill="#0d1117"/>
              <text x="260" y="34" text-anchor="middle" fill="#c9d1d9" font-size="18" font-family="Segoe UI, Arial" font-weight="600">Current Language Focus</text>

              <text x="40" y="75" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">C++</text>
              <rect x="140" y="62" width="320" height="14" rx="7" fill="#161b22"/>
              <rect x="140" y="62" width="${barWidth(cpp)}" height="14" rx="7" fill="#58a6ff"/>
              <text x="475" y="75" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">${cpp}%</text>

              <text x="40" y="110" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">JavaScript</text>
              <rect x="140" y="97" width="320" height="14" rx="7" fill="#161b22"/>
              <rect x="140" y="97" width="${barWidth(js)}" height="14" rx="7" fill="#f1e05a"/>
              <text x="475" y="110" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">${js}%</text>

              <text x="40" y="145" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">HTML</text>
              <rect x="140" y="132" width="320" height="14" rx="7" fill="#161b22"/>
              <rect x="140" y="132" width="${barWidth(html)}" height="14" rx="7" fill="#e34c26"/>
              <text x="475" y="145" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">${html}%</text>

              <text x="40" y="180" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">CSS</text>
              <rect x="140" y="167" width="320" height="14" rx="7" fill="#161b22"/>
              <rect x="140" y="167" width="${barWidth(css)}" height="14" rx="7" fill="#563d7c"/>
              <text x="475" y="180" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">${css}%</text>
            </svg>`;

            fs.writeFileSync("language-focus.svg", svg);

            const readme = fs.readFileSync('README.md', 'utf8');

            const updatedReadme = readme.replace(
              /<!--START_SECTION:live_dashboard-->[\s\S]*<!--END_SECTION:live_dashboard-->/,
              `<!--START_SECTION:live_dashboard-->\n${table}\n<!--END_SECTION:live_dashboard-->`
            );

            fs.writeFileSync('README.md', updatedReadme);

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md language-focus.svg
          git commit -m "Update live dashboard" || exit 0
          git push
