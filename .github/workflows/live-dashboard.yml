name: Update Live Learning Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-dashboard:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Dashboard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const username = "jaindhruv04";

            const { data: repos } = await github.rest.repos.listForUser({
              username: username,
              sort: "pushed",
              direction: "desc",
              per_page: 100
            });

            const activeRepos = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name !== username);

            const dashboardRepos = activeRepos.slice(0, 3);

            let dashboardTable = "";
            dashboardTable += "| Repository | Latest Activity | Updated |\n";
            dashboardTable += "|------------|----------------|---------|\n";

            for (const repo of dashboardRepos) {
              let commitMessage = "No recent commits";

              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner: username,
                  repo: repo.name,
                  per_page: 1
                });

                if (commits.length > 0) {
                  commitMessage = commits[0].commit.message
                    .split("\n")[0]
                    .replace(/\|/g, "-")
                    .substring(0, 60);
                }
              } catch (error) {
                commitMessage = "Unable to fetch commit";
              }

              const updated = new Date(repo.pushed_at).toISOString().split("T")[0];

              dashboardTable += "| [" + repo.name + "](" + repo.html_url + ") | " + commitMessage + " | " + updated + " |\n";
            }

            let totalCommits = 0;
            const commitDates = new Set();

            for (const repo of activeRepos) {
              try {
                let page = 1;

                while (true) {
                  const { data: commits } = await github.rest.repos.listCommits({
                    owner: username,
                    repo: repo.name,
                    per_page: 100,
                    page: page
                  });

                  if (commits.length === 0) {
                    break;
                  }

                  totalCommits += commits.length;

                  for (const commit of commits) {
                    if (commit.commit && commit.commit.author && commit.commit.author.date) {
                      const date = commit.commit.author.date.split("T")[0];
                      commitDates.add(date);
                    }
                  }

                  page++;
                }
              } catch (error) {}
            }

            let currentStreak = 0;
            let currentDate = new Date();

            const todayString = currentDate.toISOString().split("T")[0];

            if (!commitDates.has(todayString)) {
              currentDate.setDate(currentDate.getDate() - 1);
            }

            while (true) {
              const dateString = currentDate.toISOString().split("T")[0];

              if (commitDates.has(dateString)) {
                currentStreak++;
                currentDate.setDate(currentDate.getDate() - 1);
              } else {
                break;
              }
            }

            const analyticsTable = [
              '<table align="center">',
              '<tr>',
              '<th>Metric</th>',
              '<th>Value</th>',
              '</tr>',
              '<tr>',
              '<td>Total Commits</td>',
              '<td>' + totalCommits + '</td>',
              '</tr>',
              '<tr>',
              '<td>Current Streak</td>',
              '<td>' + currentStreak + ' days</td>',
              '</tr>',
              '</table>'
            ].join("\n");

            let readme = fs.readFileSync("README.md", "utf8");

            readme = readme.replace(
              /<!--START_SECTION:live_dashboard-->[\s\S]*<!--END_SECTION:live_dashboard-->/,
              "<!--START_SECTION:live_dashboard-->\n" + dashboardTable + "\n<!--END_SECTION:live_dashboard-->"
            );

            readme = readme.replace(
              /<!--START_SECTION:github_analytics-->[\s\S]*<!--END_SECTION:github_analytics-->/,
              "<!--START_SECTION:github_analytics-->\n" + analyticsTable + "\n<!--END_SECTION:github_analytics-->"
            );

            // Cache-bust the language stats card URL
            const timestamp = Date.now();
            readme = readme.replace(
              /src="(https:\/\/github-readme-stats\.vercel\.app\/api\/top-langs\/[^"]*?)(?:&t=\d+)?"/,
              'src="$1&t=' + timestamp + '"'
            );

            fs.writeFileSync("README.md", readme);

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          git diff --cached --quiet && exit 0

          git commit -m "Update live dashboard [skip ci]"
          git pull --rebase origin main
          git push origin main
