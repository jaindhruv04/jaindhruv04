name: Update Live Learning Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Dashboard
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = 'jaindhruv04';

            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: 'pushed',
              direction: 'desc',
              per_page: 10
            });

            const activeRepos = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name !== username)
              .slice(0, 3);

            let table = `| Repository | Latest Activity | Updated |\n`;
            table += `|------------|----------------|---------|\n`;

            const languageTotals = {};

            for (const repo of activeRepos) {
              let commitMessage = "No recent commits";

              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner: username,
                  repo: repo.name,
                  per_page: 1
                });

                if (commits.length > 0) {
                  commitMessage = commits[0].commit.message
                    .split('\n')[0]
                    .substring(0, 60);
                }
              } catch {}

              try {
                const { data: languages } = await github.rest.repos.listLanguages({
                  owner: username,
                  repo: repo.name
                });

                for (const [language, bytes] of Object.entries(languages)) {
                  languageTotals[language] = (languageTotals[language] || 0) + bytes;
                }
              } catch {}

              const updated = new Date(repo.pushed_at)
                .toISOString()
                .split('T')[0];

              table += `| [${repo.name}](${repo.html_url}) | ${commitMessage} | ${updated} |\n`;
            }

            const sortedLanguages = Object.entries(languageTotals)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5);

            const total = sortedLanguages.reduce((sum, [, bytes]) => sum + bytes, 0);

            const colors = [
              "#58a6ff",
              "#f1e05a",
              "#e34c26",
              "#563d7c",
              "#2ea043"
            ];

            const barWidth = (percent) => Math.max(4, Math.round(percent * 3.2));

            let languageRows = "";

            sortedLanguages.forEach(([language, bytes], index) => {
              const percent = total === 0 ? 0 : Math.round((bytes / total) * 100);
              const y = 75 + index * 35;
              const color = colors[index % colors.length];

              languageRows += `
              <text x="40" y="${y}" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">${language}</text>
              <rect x="160" y="${y - 13}" width="300" height="14" rx="7" fill="#161b22"/>
              <rect x="160" y="${y - 13}" width="${barWidth(percent)}" height="14" rx="7" fill="${color}"/>
              <text x="475" y="${y}" fill="#c9d1d9" font-size="14" font-family="Segoe UI, Arial">${percent}%</text>`;
            });

            const svgHeight = 80 + sortedLanguages.length * 35;

            const svg = `<svg width="520" height="${svgHeight}" xmlns="http://www.w3.org/2000/svg">
              <rect width="520" height="${svgHeight}" rx="14" fill="#0d1117"/>
              <text x="260" y="34" text-anchor="middle" fill="#c9d1d9" font-size="18" font-family="Segoe UI, Arial" font-weight="600">Current Language Focus</text>
              ${languageRows}
            </svg>`;

            fs.writeFileSync("language-focus.svg", svg);

            const readme = fs.readFileSync('README.md', 'utf8');

            const updatedReadme = readme.replace(
              /<!--START_SECTION:live_dashboard-->[\s\S]*<!--END_SECTION:live_dashboard-->/,
              `<!--START_SECTION:live_dashboard-->\n${table}\n<!--END_SECTION:live_dashboard-->`
            );

            fs.writeFileSync('README.md', updatedReadme);

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md language-focus.svg
          git commit -m "Update live dashboard" || exit 0
          git push
