name: Update Live Learning Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Generate dashboard
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const username = "jaindhruv04";
            const profileRepo = "jaindhruv04";

            const { data: repos } = await github.rest.repos.listForUser({
              username,
              sort: "pushed",
              direction: "desc",
              per_page: 10
            });

            const activeRepos = repos
              .filter(repo => !repo.fork)
              .filter(repo => repo.name !== profileRepo)
              .slice(0, 3);

            let dashboard = `| Repository | Current Activity | Last Updated |\n`;
            dashboard += `|---|---|---|\n`;

            for (const repo of activeRepos) {
              let latestCommit = "No recent commit found";

              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner: username,
                  repo: repo.name,
                  per_page: 1
                });

                if (commits.length > 0) {
                  latestCommit = commits[0].commit.message.split("\n")[0];
                }
              } catch (error) {
                latestCommit = "Commit data unavailable";
              }

              const updatedDate = new Date(repo.pushed_at).toLocaleDateString("en-IN", {
                year: "numeric",
                month: "short",
                day: "numeric"
              });

              dashboard += `| [${repo.name}](${repo.html_url}) | ${latestCommit} | ${updatedDate} |\n`;
            }

            const readmePath = "README.md";
            let readme = fs.readFileSync(readmePath, "utf8");

            const start = "<!--START_SECTION:live_dashboard-->";
            const end = "<!--END_SECTION:live_dashboard-->";

            const updatedReadme = readme.replace(
              new RegExp(`${start}[\\s\\S]*${end}`),
              `${start}\n${dashboard}\n${end}`
            );

            fs.writeFileSync(readmePath, updatedReadme);

      - name: Commit updated README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update live learning dashboard" || exit 0
          git push
